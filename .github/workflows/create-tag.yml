name: Create Release Tag

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name to create (example: v0.1.0)'
        required: true
        default: 'v0.1.0'
      target_ref:
        description: 'Branch or commit to tag (example: main)'
        required: true
        default: 'main'

permissions:
  contents: write

jobs:
  create-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          tag_name='${{ inputs.tag_name }}'
          target_ref='${{ inputs.target_ref }}'

          if [[ ! "$tag_name" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
            echo "Invalid tag format: $tag_name"
            echo "Expected format like v0.1.0 or v0.1.0-rc.1"
            exit 1
          fi

          git fetch --tags origin

          if git ls-remote --exit-code --tags origin "refs/tags/${tag_name}" >/dev/null 2>&1; then
            echo "Tag ${tag_name} already exists on origin."
            exit 1
          fi

          git tag "${tag_name}" "origin/${target_ref}"
          git push origin "${tag_name}"

          echo "Created and pushed ${tag_name} from origin/${target_ref}."
